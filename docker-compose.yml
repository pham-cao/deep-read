version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: deep-read-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SECRET_KEY=${SECRET_KEY}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}
      - BACKEND_URL=${BACKEND_URL:-http://localhost:8000}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-deepread}:${POSTGRES_PASSWORD:-deepread_pass}@postgres:5432/${POSTGRES_DB:-deepread}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deep-read-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: deep-read-postgres
    environment:
      - POSTGRES_USER=deepread
      - POSTGRES_PASSWORD=deepread_pass
      - POSTGRES_DB=deepread
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
    networks:
      - deep-read-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deepread}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  deep-read-network:
    driver: bridge

volumes:
  postgres_data:
